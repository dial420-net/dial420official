<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dial420</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #ffffff;
            color: #111111;
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 25px;
            text-align: center;
        }

        .tagline {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .mission {
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .mission p {
            margin-bottom: 20px;
        }

        .button {
            display: inline-block;
            padding: 14px 28px;
            text-decoration: none;
            border: 2px solid #111;
            color: #111;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.2s ease;
        }

        .button:hover {
            background-color: #111;
            color: white;
        }

        footer {
            margin-top: 60px;
            opacity: 0.6;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

    </style>

</head>

<body>

<img src="Hero-banner.jpeg"
     alt="Dial420 Michigan Cannabis Culture"
     class="hero-image">

    <div class="content">

        <p class="tagline">
            A signal for and from the budding Michigan cannabis culture.
        </p>

        <div class="mission">

            <p>
                Dial420 documents stories, observations, and knowledge emerging from Michigan's cannabis community.
            </p>

            <p>
                Built from the ground level — by consumers, budtenders, growers, creators, and culture.
            </p>

        </div>

        <a href="#" class="button">
            First Signal Coming Soon
        </a>

        <footer>
            SIGNAL OVER NOISE
        </footer>

    </div>

</body>
</html>
